<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
  <title id="title">Higgins Building Group after website screenshot-style preview</title>
  <desc id="desc">A screenshot-style visual of the redesigned Higgins Building Group website with a premium modern layout.</desc>
  <defs>
    <linearGradient id="screen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1220"/><stop offset=".55" stop-color="#111827"/><stop offset="1" stop-color="#1f2937"/>
    </linearGradient>
    <linearGradient id="home" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0" stop-color="#64513d"/><stop offset=".42" stop-color="#b58d5c"/><stop offset="1" stop-color="#eef2f7"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="20" stdDeviation="28" flood-color="#020617" flood-opacity=".34"/>
    </filter>
  </defs>
  <rect width="1280" height="760" rx="48" fill="#f8fafc"/>
  <rect x="0" y="0" width="1280" height="760" rx="48" fill="#dbeafe" opacity=".55"/>
  <g filter="url(#shadow)">
