      <text x="24" y="42" fill="#ffffff" font-family="Arial, sans-serif" font-size="18" font-weight="700">Built for Vercel</text>
      <text x="24" y="74" fill="#94a3b8" font-family="Arial, sans-serif" font-size="15">Fast deployment workflow</text>
