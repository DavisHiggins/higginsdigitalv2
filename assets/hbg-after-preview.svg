    <rect x="86" y="70" width="1108" height="68" rx="30" fill="#0f172a"/>
    <circle cx="132" cy="104" r="9" fill="#ef4444"/><circle cx="162" cy="104" r="9" fill="#f59e0b"/><circle cx="192" cy="104" r="9" fill="#22c55e"/>
    <rect x="246" y="94" width="520" height="18" rx="9" fill="#334155"/>
    <text x="132" y="188" fill="#e2e8f0" font-family="Arial, sans-serif" font-size="20" font-weight="700">Higgins Building Group · Hickory, NC</text>
    <text x="132" y="265" fill="#ffffff" font-family="Arial, sans-serif" font-size="60" font-weight="800">Custom luxury homes,</text>
    <text x="132" y="332" fill="#ffffff" font-family="Arial, sans-serif" font-size="60" font-weight="800">built across WNC.</text>
