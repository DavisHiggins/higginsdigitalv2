  <path d="M610 392h52" stroke="#93c5fd" stroke-width="16" stroke-linecap="round"/><path d="M654 360l38 32-38 32" fill="none" stroke="#93c5fd" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"/>
  <g font-family="Arial, sans-serif" font-weight="800" font-size="18">
    <rect x="252" y="622" width="168" height="48" rx="24" fill="#ffffff" opacity=".12"/><text x="304" y="653" fill="#ffffff">BEFORE</text>
    <rect x="854" y="622" width="168" height="48" rx="24" fill="#38bdf8" opacity=".26"/><text x="916" y="653" fill="#ffffff">AFTER</text>
