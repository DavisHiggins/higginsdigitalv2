<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
  <title id="title">Higgins Building Group website transformation</title>
  <desc id="desc">A before and after showcase graphic showing the dated old site next to the redesigned modern site.</desc>
  <defs>
    <linearGradient id="night" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#06111f"/><stop offset="1" stop-color="#123c6a"/></linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#0ea5e9"/><stop offset="1" stop-color="#1d4ed8"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="22" stdDeviation="30" flood-color="#020617" flood-opacity=".25"/></filter>
  </defs>
  <rect width="1280" height="760" rx="48" fill="url(#night)"/>
  <circle cx="1110" cy="90" r="190" fill="#38bdf8" opacity=".14"/>
  <circle cx="130" cy="690" r="260" fill="#2563eb" opacity=".15"/>
  <text x="80" y="102" fill="#ffffff" font-family="Arial, sans-serif" font-size="44" font-weight="800">Before → After Website Transformation</text>
  <text x="82" y="144" fill="#cbd5e1" font-family="Arial, sans-serif" font-size="20">A premium rebuild for Higgins Building Group, designed to replace a dated layout with a modern client-facing experience.</text>
