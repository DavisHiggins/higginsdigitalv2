    <g transform="translate(88 210)">
      <rect width="496" height="378" rx="30" fill="#f8fafc"/>
      <rect width="496" height="58" rx="30" fill="#e2e8f0"/>
      <circle cx="38" cy="30" r="7" fill="#ef4444"/><circle cx="64" cy="30" r="7" fill="#f59e0b"/><circle cx="90" cy="30" r="7" fill="#22c55e"/>
      <rect x="36" y="94" width="118" height="238" rx="12" fill="#e5e7eb"/>
      <rect x="186" y="94" width="254" height="92" rx="14" fill="#cbd5e1"/>
      <rect x="186" y="218" width="220" height="18" rx="9" fill="#334155"/>
      <rect x="186" y="254" width="250" height="12" rx="6" fill="#94a3b8"/>
      <rect x="186" y="280" width="220" height="12" rx="6" fill="#94a3b8"/>
      <text x="34" y="428" fill="#ffffff" font-family="Arial, sans-serif" font-size="0"> </text>
    </g>
    <g transform="translate(696 210)">
      <rect width="496" height="378" rx="30" fill="#0f172a"/>
      <rect width="496" height="58" rx="30" fill="#111827"/>
      <circle cx="38" cy="30" r="7" fill="#ef4444"/><circle cx="64" cy="30" r="7" fill="#f59e0b"/><circle cx="90" cy="30" r="7" fill="#22c55e"/>
      <text x="44" y="122" fill="#e2e8f0" font-family="Arial, sans-serif" font-size="16" font-weight="700">Custom Home Builders · Hickory, NC</text>
      <text x="44" y="178" fill="#ffffff" font-family="Arial, sans-serif" font-size="42" font-weight="800">Custom luxury</text>
      <text x="44" y="226" fill="#ffffff" font-family="Arial, sans-serif" font-size="42" font-weight="800">homes across WNC</text>
      <rect x="44" y="264" width="150" height="42" rx="21" fill="#ffffff"/>
      <text x="72" y="291" fill="#0f172a" font-family="Arial, sans-serif" font-size="14" font-weight="700">Begin a Project</text>
      <rect x="298" y="92" width="156" height="214" rx="18" fill="url(#blue)" opacity=".95"/>
